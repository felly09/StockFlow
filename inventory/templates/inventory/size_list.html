{% extends 'base.html' %}

{% block content %}

<h2>📏 Sizes</h2>

<a href="{% url 'add_size' %}">
    ➕ Add Size
</a>

<table border="1">

    <tr>
        <th>Size Name</th>
        <th>Actions</th>
    </tr>

    {% for size in sizes %}

    <tr>

        <td>{{ size.name }}</td>

        <td>

            <a href="{% url 'edit_size' size.id %}">
                ✏ Edit
            </a>

            <a href="{% url 'delete_size' size.id %}">
                🗑 Delete
            </a>

        </td>

    </tr>

    {% endfor %}

</table>

{% endblock %}
