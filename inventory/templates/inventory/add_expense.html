{% extends 'base.html' %}

{% block title %}Add Expense{% endblock %}

{% block content %}
<div class="card">
    <h2>💰 Add Expense</h2>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}

        <button class="btn-primary">Save Expense</button>
    </form>

    <a href="{% url 'expense_list' %}" class="back-link">
        📊 View Expenses
    </a>
</div>
{% endblock %}
