{% extends 'base.html' %}

{% block content %}

<h2>🏢 Store List</h2>

<a href="{% url 'add_store' %}">➕ Add Store</a>

<table border="1">
    <tr>
        <th>Name</th>
        <th>Location</th>
        <th>Actions</th>
    </tr>

    {% for store in stores %}
    <tr>
        <td>{{ store.name }}</td>
        <td>{{ store.location }}</td>

        <td>
            <a href="{% url 'edit_store' store.id %}" class="btn-edit">✏ Edit</a>
            <a href="{% url 'delete_store' store.id %}" class="btn-delete">🗑 Delete</a>
        </td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
