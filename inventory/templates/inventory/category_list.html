{% extends 'base.html' %}

{% block title %}Categories{% endblock %}

{% block content %}

<div class="card">

    <h2>📂 Categories</h2>

    <a href="{% url 'add_category' %}" class="btn">
        ➕ Add Category
    </a>

    <br><br>

    <table class="table">

        <thead>
            <tr>
                <th>Category Name</th>
                <th>Actions</th>
            </tr>
        </thead>

        <tbody>

            {% for category in categories %}

            <tr>

                <td>{{ category.name }}</td>

                <td>

                    <a href="{% url 'edit_category' category.id %}"
                       class="btn-edit">

                        ✏ Edit

                    </a>

                    <a href="{% url 'delete_category' category.id %}"
                       class="btn-delete">

                        🗑 Delete

                    </a>

                </td>

            </tr>

            {% endfor %}

        </tbody>

    </table>

</div>

{% endblock %}
