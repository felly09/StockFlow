{% extends 'base.html' %}

{% block title %}Add Stock{% endblock %}

{% block content %}
<div class="card">
    <h2>📥 Add Stock</h2>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}

        <button class="btn-primary">Add Stock</button>
    </form>

    <a href="{% url 'product_list' %}" class="back-link">
        📦 Back to Products
    </a>
</div>
{% endblock %}
