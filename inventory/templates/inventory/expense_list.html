{% extends 'base.html' %}

{% block content %}

<h2>💰 Expense List</h2>

<table border="1">

    <tr>
        <th>Store</th>
        <th>Title</th>
        <th>Amount</th>
        <th>Payment Method</th>
        <th>Date</th>
        <th>Actions</th>
    </tr>

    {% for expense in expenses %}
    <tr>

        <td>{{ expense.store.name }}</td>

        <td>{{ expense.title }}</td>

        <td>{{expense.amount}}</td>

        <td>{{expense.payment_method}}</td>

        <td>{{expense.date}}</td>

        <td>
            <a href="{% url 'edit_expense' expense.id %}"  class="btn-edit">
                ✏ Edit
            </a>

            <a href="{% url 'delete_expense' expense.id %}" class="btn-delete">
                🗑 Delete
            </a>
        </td>

    </tr>
    {% endfor %}

</table>

{% endblock %}
